<script>
    // 1. save data ->
    localStorage.setItem("name", "aryan")
    localStorage.setItem("id",24)

    // 2. get read ->
    let nm = localStorage.getItem("name");
    console.log(nm);

    // 3. remove/delete key value pair ->
    localStorage.removeItem("name");

    // 4. clear ->
    localStorage.clear()
    
</script>
